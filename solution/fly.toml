# fly.toml — Task Manager API deployment configuration
# See docs/modules/13-continuous-deployment.md for setup instructions.

app = "task-manager-api"
primary_region = "sin"

[build]
  # Replace YOUR_GITHUB_USERNAME with your GitHub username.
  # The CD workflow deploys by passing --image explicitly, so this field is used
  # for `flyctl deploy` from your local machine only.
  image = "ghcr.io/YOUR_GITHUB_USERNAME/task-manager/api:latest"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  # Set OTEL_ENABLED="true" and add OTLP_ENDPOINT via `flyctl secrets set` once
  # you have an OTLP-compatible collector (Grafana Cloud, Honeycomb, etc.).
  OTEL_ENABLED = "false"
  # CORS_ORIGINS — set via: flyctl secrets set CORS_ORIGINS="https://your-frontend.fly.dev"

[deploy]
  # Runs `alembic upgrade head` before traffic switches to the new version.
  # If this command fails, the deploy is aborted — safe for backward-compatible migrations.
  release_command = "alembic upgrade head"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
