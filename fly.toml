# fly.toml — Task Manager API (production)
# See docs/modules/13-continuous-deployment.md for setup instructions.
#
# Quick start:
#   flyctl launch --name task-manager-api --no-deploy   (creates the app)
#   flyctl secrets set SECRET_KEY="$(openssl rand -hex 32)"
#   flyctl secrets set CORS_ORIGINS="https://task-manager-frontend.fly.dev"
#   flyctl deploy --image ghcr.io/YOUR_GITHUB_USERNAME/task-manager/api:latest

app = "task-manager-api"
primary_region = "sin"   # Singapore — change to your nearest: lax, ord, fra, nrt

[build]
  # The CD workflow passes --image explicitly; this field is used for local `flyctl deploy` only.
  image = "ghcr.io/YOUR_GITHUB_USERNAME/task-manager/api:latest"

[env]
  PORT = "8000"
  ENVIRONMENT = "production"
  # Set OTEL_ENABLED="true" and add OTLP_ENDPOINT via `flyctl secrets set` once
  # you have an OTLP-compatible collector (Grafana Cloud, Honeycomb, etc.).
  OTEL_ENABLED = "false"

  # Non-sensitive env vars above. Secrets below go in Fly.io secret store, NOT here:
  #   flyctl secrets set SECRET_KEY="..."
  #   flyctl secrets set DATABASE_URL="postgresql+asyncpg://..."
  #   flyctl secrets set CORS_ORIGINS="https://task-manager-frontend.fly.dev"

[deploy]
  # Runs migrations before traffic switches to the new version.
  # If this command fails, the deploy is aborted — old version keeps serving traffic.
  release_command = "alembic upgrade head"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [services.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

  [[services.http_checks]]
    interval = "10s"
    timeout = "5s"
    grace_period = "30s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
