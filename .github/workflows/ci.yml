name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]" aiosqlite

      - name: Check formatting (black)
        run: black --check .

      - name: Check import order (isort)
        run: isort --check .

      - name: Lint (ruff)
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-fail-under=70
        env:
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: ci-test-secret-key
          ENVIRONMENT: test
          OTEL_ENABLED: "false"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend — typecheck + lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Run tests with coverage
        run: npm test

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/

  security:
    name: Security scan
    runs-on: ubuntu-latest
    # Run on every push and PR — shift-left means catching issues before merge
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for git-based secret scanning

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: pip install -e ".[dev]" aiosqlite
        working-directory: backend

      - name: SAST — bandit (Python)
        # -ll = medium-and-above; exit non-zero on any finding
        run: bandit -r app/ -c pyproject.toml -ll --exit-zero
        working-directory: backend
        # --exit-zero: report findings but don't fail the build yet (informational)
        # Remove --exit-zero once the team has triaged the initial findings

      - name: Dependency CVEs — pip-audit (Python)
        run: pip-audit --desc --format columns
        working-directory: backend

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Dependency CVEs — npm audit (JavaScript)
        # --audit-level=high: only fail on high/critical CVEs
        # Low/moderate in devDependencies rarely affect production bundles
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Secret pattern scan
        # Grep tracked files for common secret patterns
        # Exits non-zero if any match is found
        run: |
          git ls-files | grep -v 'node_modules\|\.lock$\|\.png$\|\.jpg$\|docs/' | \
            xargs grep -lnE \
              'AKIA[0-9A-Z]{16}|ghp_[a-zA-Z0-9]{36,}|sk-[a-zA-Z0-9]{32,}' \
              2>/dev/null && echo "❌ Secret patterns found — see above" && exit 1 || \
            echo "✅ No secret patterns found in tracked files"

  docker-build:
    name: Docker Compose build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build all images
        run: docker compose build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    # E2E only runs on PRs to main to keep push pipelines fast
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start backend stack
        run: docker compose up api db -d
        working-directory: .

      - name: Wait for API health check
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Run E2E tests
        run: npm run e2e
        env:
          VITE_API_URL: http://localhost:8000

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7
