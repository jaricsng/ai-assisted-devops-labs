name: Drift Detection

# Runs nightly and can be triggered manually.
# Detects when the running production image diverges from the latest
# image built from main — a signal that a deploy was skipped, a hotfix
# was applied outside CI, or a rollback is still in place.
#
# Also validates that OpenAPI schema in docs/api/openapi.yaml is in sync
# with the live API contract (prevents silent schema drift).

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:        # manual trigger for on-demand checks

jobs:
  image-drift:
    name: Check image tag drift (staging vs main)
    runs-on: ubuntu-latest
    # Only meaningful when staging deploy is active; skip otherwise.
    if: vars.STAGING_API_URL != ''
    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4

      - name: Get latest image tag built from main
        id: latest
        run: |
          LATEST=$(git rev-parse --short=7 HEAD)
          echo "sha=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Get image tag running in staging
        id: staging
        env:
          STAGING_URL: ${{ vars.STAGING_API_URL }}
        run: |
          RESPONSE=$(curl -sf "${STAGING_URL}/health" || echo '{}')
          VERSION=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('version','unknown'))" 2>/dev/null || echo "unknown")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Staging reports version: $VERSION"

      - name: Report drift status
        env:
          LATEST_SHA: ${{ steps.latest.outputs.sha }}
          STAGING_VERSION: ${{ steps.staging.outputs.version }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          echo "Latest commit SHA (short): ${LATEST_SHA}"
          echo "Staging version:           ${STAGING_VERSION}"
          # Version in /health is the semver from pyproject.toml, not the SHA.
          # This check flags when staging is down or returning unexpected version.
          if [ "$STAGING_VERSION" = "unknown" ]; then
            echo "⚠️  Could not read version from staging — possible outage or misconfiguration"
            if [ -n "$SLACK_WEBHOOK_URL" ]; then
              curl -sf -X POST "$SLACK_WEBHOOK_URL" \
                -H "Content-Type: application/json" \
                -d "{\"text\": \":warning: Drift check: staging \`/health\` unreachable. <${RUN_URL}|View run>\"}"
            fi
            exit 1
          fi
          echo "✅ Staging is responding (version: ${STAGING_VERSION})"

  schema-drift:
    name: Check OpenAPI schema drift
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: taskuser
          POSTGRES_PASSWORD: taskpass
          POSTGRES_DB: taskmanager
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend
        run: pip install -e ".[dev]"
        working-directory: backend

      - name: Start API and export live schema
        run: |
          uvicorn app.main:app --host 127.0.0.1 --port 8000 &
          sleep 5
          curl -sf http://127.0.0.1:8000/openapi.json -o /tmp/live-openapi.json
          kill %1 2>/dev/null || true
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://taskuser:taskpass@localhost:5432/taskmanager
          SECRET_KEY: drift-check-key-not-for-production
          ENVIRONMENT: test
          OTEL_ENABLED: "false"

      - name: Install yq for YAML→JSON conversion
        run: pip install yq -q

      - name: Convert committed schema to JSON
        run: yq . docs/api/openapi.yaml > /tmp/committed-openapi.json

      - name: Compare schemas (paths and method signatures only)
        run: |
          python3 - <<'PYEOF'
          import json, sys

          def extract_signatures(doc):
              """Return a dict of path→{method: [param_names]} for comparison."""
              sigs = {}
              for path, methods in doc.get("paths", {}).items():
                  sigs[path] = {}
                  for method, op in methods.items():
                      if method in ("get","post","put","patch","delete","options","head"):
                          params = sorted(
                              p["name"] for p in op.get("parameters", [])
                          )
                          sigs[path][method] = params
              return sigs

          live = extract_signatures(json.load(open("/tmp/live-openapi.json")))
          committed = extract_signatures(json.load(open("/tmp/committed-openapi.json")))

          diffs = []
          all_paths = set(live) | set(committed)
          for path in sorted(all_paths):
              if path not in committed:
                  diffs.append(f"NEW path in live API (not in committed schema): {path}")
              elif path not in live:
                  diffs.append(f"MISSING path from live API (in committed schema): {path}")
              else:
                  for method in set(live[path]) | set(committed[path]):
                      if method not in committed[path]:
                          diffs.append(f"NEW {method.upper()} {path} (not in committed schema)")
                      elif method not in live[path]:
                          diffs.append(f"REMOVED {method.upper()} {path} (was in committed schema)")
                      elif live[path][method] != committed[path][method]:
                          diffs.append(
                              f"PARAM CHANGE {method.upper()} {path}: "
                              f"live={live[path][method]} committed={committed[path][method]}"
                          )

          if diffs:
              print("❌ Schema drift detected:")
              for d in diffs:
                  print(f"  {d}")
              sys.exit(1)
          else:
              print("✅ No schema drift — docs/api/openapi.yaml matches live API")
          PYEOF

      - name: Notify Slack on schema drift
        if: failure()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "SLACK_WEBHOOK_URL not set — skipping Slack notification"
            exit 0
          fi
          curl -sf -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \":warning: OpenAPI schema drift detected — \`docs/api/openapi.yaml\` is out of sync with the live API. <${RUN_URL}|View run>\"}"
